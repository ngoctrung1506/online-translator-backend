<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilingual Chat Interpreter (0.3s Fast Cut)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #4f46e5;
            margin-top: 0;
            font-size: 22px;
        }
        .status-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #2d2d2d;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ef4444;
            display: inline-block;
            margin-right: 6px;
        }
        .status-dot.online { background-color: #10b981; }
        .status-dot.recording { background-color: #3b82f6; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; }
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #4f46e5;
            color: white;
        }
        .btn:hover { background-color: #4338ca; }
        .btn.active { background-color: #ef4444; }
        .btn:disabled { background-color: #4b5563; cursor: not-allowed; }

        /* 🌟 GIAO DIỆN CHAT CHIA HAI BÊN TRÁI PHẢI */
        .chat-area {
            background-color: #141414;
            padding: 20px;
            border-radius: 12px;
            height: 450px;
            overflow-y: auto;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border: 1px solid #2b2b2b;
        }
        .msg-wrapper {
            display: flex;
            width: 100%;
        }
        /* Nói tiếng Việt -> Căn lề bên Trái */
        .msg-wrapper.vi-side {
            justify-content: flex-start;
        }
        /* Nói tiếng Anh -> Căn lề bên Phải */
        .msg-wrapper.en-side {
            justify-content: flex-end;
        }
        .chat-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            animation: pop 0.2s ease;
        }
        @keyframes pop {
            from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; }
        }
        .vi-side .chat-bubble {
            background-color: #262626;
            border-left: 4px solid #3b82f6;
            border-bottom-left-radius: 2px;
        }
        .en-side .chat-bubble {
            background-color: #1e293b;
            border-right: 4px solid #10b981;
            border-bottom-right-radius: 2px;
            text-align: right;
        }
        /* Chữ gốc hiển thị ở trên */
        .txt-src {
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 4px;
        }
        .vi-side .txt-src { color: #60a5fa; }
        .en-side .txt-src { color: #34d399; }

        /* Chữ dịch hiển thị ngay ở dưới */
        .txt-trans {
            font-size: 15px;
            color: #ffffff;
            border-top: 1px dashed #3d3d3d;
            padding-top: 4px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Bilingual Chat Interpreter</h1>
    
    <div class="status-box">
        <div>Trạng thái: <span id="status-text">Đang ngắt kết nối</span></div>
        <div style="display: flex; align-items: center;">
            <span id="status-indicator" class="status-dot"></span>
            <span id="state-label">OFFLINE</span>
        </div>
    </div>

    <button id="action-btn" class="btn" disabled>Đang kết nối Server...</button>

    <!-- 🌟 KHUNG CHAT HAI BÊN CHẠY DỌC -->
    <div id="chat-area" class="chat-area"></div>
</div>

<script>
    // ĐIỀN LINK RENDER CỦA ÔNG VÀO ĐÂY (GIỮ NGUYÊN WSS://)
    https://.trycloudflare.com  
    const RENDER_WS_URL = 'wss://[headphones-tap-partners-barrel.trycloudflare.com/ws](https://headphones-tap-partners-barrel.trycloudflare.com/ws)';
    // const RENDER_WS_URL = 'wss://online-translator-backend.onrender.com/ws';

    let socket;
    let audioContext;
    let processor;
    let globalStream;
    let isRecording = false;

    const actionBtn = document.getElementById('action-btn');
    const statusText = document.getElementById('status-text');
    const statusIndicator = document.getElementById('status-indicator');
    const stateLabel = document.getElementById('state-label');
    const chatArea = document.getElementById('chat-area');

    function initWebSocket() {
        statusText.innerText = "Đang kết nối tới Render Cloud...";
        socket = new WebSocket(RENDER_WS_URL);

        socket.onopen = () => {
            statusText.innerText = "Sẵn sàng hoạt động";
            statusIndicator.className = "status-dot online";
            stateLabel.innerText = "ONLINE";
            actionBtn.innerText = "Bật Microphone";
            actionBtn.disabled = false;
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'result') {
                // TẠO HÀNG BAO BỌC ĐỂ CHIA TRÁI / PHẢI
                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${data.lang}-side`; // Sẽ là vi-side hoặc en-side
                
                // TẠO BONG BÓNG CHAT: GỐC Ở TRÊN, DỊCH NGAY Ở DƯỚI
                const bubble = document.createElement('div');
                bubble.className = 'chat-bubble';
                
                const prefixSrc = data.lang === 'vi' ? '🗣️ Việt' : '🗣️ English';
                const prefixTrans = data.lang === 'vi' ? '🔄 English' : '🔄 Việt';

                bubble.innerHTML = `
                    <div class="txt-src">${prefixSrc}: ${data.original}</div>
                    <div class="txt-trans">${prefixTrans}: ${data.translated}</div>
                `;
                
                wrapper.appendChild(bubble);
                chatArea.appendChild(wrapper);
                chatArea.scrollTop = chatArea.scrollHeight; // Tự cuộn khung chat xuống đáy
            }
        };

        socket.onclose = () => {
            statusText.innerText = "Mất kết nối. Đang thử lại...";
            statusIndicator.className = "status-dot";
            stateLabel.innerText = "OFFLINE";
            actionBtn.disabled = true;
            if (isRecording) stopRecording();
            setTimeout(initWebSocket, 5000);
        };
    }

    function float32ToInt16(buffer) {
        let l = buffer.length;
        let buf = new Int16Array(l);
        while (l--) {
            let s = Math.max(-1, Math.min(1, buffer[l]));
            buf[l] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        return buf.buffer;
    }

    async function startRecording() {
        try {
            globalStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const input = audioContext.createMediaStreamSource(globalStream);
            processor = audioContext.createScriptProcessor(2048, 1, 1);

            processor.onaudioprocess = (e) => {
                if (!isRecording || socket.readyState !== WebSocket.OPEN) return;
                const leftChannel = e.inputBuffer.getChannelData(0);
                const int16Buffer = float32ToInt16(leftChannel);
                socket.send(int16Buffer);
            };

            input.connect(processor);
            processor.connect(audioContext.destination);

            isRecording = true;
            statusText.innerText = "Hệ thống đang lắng nghe...";
            statusIndicator.className = "status-dot recording";
            stateLabel.innerText = "RECORDING";
            actionBtn.innerText = "Tắt Microphone";
            actionBtn.classList.add('active');
        } catch (err) {
            alert("Không mở được mic: " + err);
            stopRecording();
        }
    }

    function stopRecording() {
        isRecording = false;
        actionBtn.classList.remove('active');
        actionBtn.innerText = "Bật Microphone";
        statusText.innerText = "Sẵn sàng hoạt động";
        statusIndicator.className = "status-dot online";
        stateLabel.innerText = "ONLINE";

        if (processor) processor.disconnect();
        if (audioContext) audioContext.close();
        if (globalStream) globalStream.getTracks().forEach(track => track.stop());
    }

    actionBtn.onclick = () => {
        if (!isRecording) startRecording(); else stopRecording();
    };

    initWebSocket();
</script>
</body>
</html>
